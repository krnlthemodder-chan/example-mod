name: Build Geode Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release
  GEODE_SDK_VERSION: "3.0.0"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Setup Geode SDK
      run: |
        mkdir -p ${{github.workspace}}/geode-sdk
        cd ${{github.workspace}}/geode-sdk
        wget -O sdk.zip https://github.com/geode-sdk/geode/releases/download/v${{env.GEODE_SDK_VERSION}}/geode-sdk-linux.zip
        unzip -q sdk.zip
        export GEODE_SDK="${{github.workspace}}/geode-sdk"
        echo "GEODE_SDK=$GEODE_SDK" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_GENERATOR=Ninja

    - name: Build mod binary
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Package as .geode file
      run: |
        cd ${{github.workspace}}/build
        ${{env.GEODE_SDK}}/geode package .

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: geode-mod-linux
        path: ${{github.workspace}}/build/*.geode
        retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install cmake ninja

    - name: Setup Geode SDK
      run: |
        mkdir -p ${{github.workspace}}/geode-sdk
        cd ${{github.workspace}}/geode-sdk
        wget -O sdk.zip https://github.com/geode-sdk/geode/releases/download/v${{env.GEODE_SDK_VERSION}}/geode-sdk-mac.zip
        unzip -q sdk.zip
        export GEODE_SDK="${{github.workspace}}/geode-sdk"
        echo "GEODE_SDK=$GEODE_SDK" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_GENERATOR=Ninja

    - name: Build mod binary
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Package as .geode file
      run: |
        cd ${{github.workspace}}/build
        ${{env.GEODE_SDK}}/geode package .

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: geode-mod-mac
        path: ${{github.workspace}}/build/*.geode
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions](#)
